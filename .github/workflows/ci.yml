name: CI/CD — Production Readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  # Job 1: Lint & Validate
  # ──────────────────────────────────────
  validate:
    name: Production Readiness Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd 06-lab-complete
          pip install -r requirements.txt

      - name: Run production readiness checker
        run: |
          cd 06-lab-complete
          python check_production_ready.py

  # ──────────────────────────────────────
  # Job 2: Docker Build Test
  # ──────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd 06-lab-complete
          docker build -t ai-agent:test .

      - name: Check image size
        run: |
          SIZE=$(docker image inspect ai-agent:test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 500 ]; then
            echo "Image too large (>500 MB)"
            exit 1
          fi
          echo "Image size OK (<500 MB)"

      - name: Start container & health check
        run: |
          docker run -d --name agent-test \
            -p 8000:8000 \
            -e ENVIRONMENT=testing \
            -e AGENT_API_KEY=test-key-ci \
            ai-agent:test

          echo "⏳ Waiting for container to start..."
          sleep 10

          # Health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Health check passed (HTTP $HTTP_CODE)"
          else
            echo "Health check failed (HTTP $HTTP_CODE)"
            docker logs agent-test
            exit 1
          fi

          # Ready check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ready)
          echo "Ready check: HTTP $HTTP_CODE"

          # Auth check (should return 401 without key)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/ask \
            -H "Content-Type: application/json" \
            -d '{"question":"test"}')
          if [ "$HTTP_CODE" = "401" ]; then
            echo "Auth works (401 without key)"
          else
            echo "Auth check failed (expected 401, got $HTTP_CODE)"
            exit 1
          fi

          # Auth check (should return 200 with key)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/ask \
            -H "Content-Type: application/json" \
            -H "X-API-Key: test-key-ci" \
            -d '{"question":"test"}')
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Ask with key works (200)"
          else
            echo "Ask failed (expected 200, got $HTTP_CODE)"
            docker logs agent-test
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f agent-test 2>/dev/null || true
