name: CI/CD — Production Readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  # Job 1: Lint & Validate
  # ──────────────────────────────────────
  validate:
    name: Production Readiness Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd 06-lab-complete
          pip install -r requirements.txt

      - name: Run production readiness checker
        run: |
          cd 06-lab-complete
          python check_production_ready.py

  # ──────────────────────────────────────
  # Job 2: Docker Build Test
  # ──────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd 06-lab-complete
          docker build -t ai-agent:test .

      - name: Check image size
        run: |
          SIZE=$(docker image inspect ai-agent:test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 500 ]; then
            echo "Image too large (>500 MB)"
            exit 1
          fi
          echo "Image size OK (<500 MB)"

      - name: Start container & health check
        run: |
          # Start with single worker (multi-worker can fail in CI)
          docker run -d --name agent-test \
            -p 8000:8000 \
            -e ENVIRONMENT=testing \
            -e AGENT_API_KEY=test-key-ci \
            ai-agent:test \
            uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

          # Wait for container to be healthy (retry up to 30s)
          echo "Waiting for container..."
          for i in $(seq 1 15); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "Container ready after ${i}x2 seconds"
              break
            fi
            if [ "$i" = "15" ]; then
              echo "Container failed to start. Logs:"
              docker logs agent-test
              exit 1
            fi
            sleep 2
          done

          # Test 1: Health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health check: HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { docker logs agent-test; exit 1; }

          # Test 2: Ready check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ready)
          echo "Ready check: HTTP $HTTP_CODE"

          # Test 3: Auth required (no key -> 401)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/ask \
            -H "Content-Type: application/json" \
            -d '{"question":"test"}')
          echo "Auth check (no key): HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "401" ] || { echo "Expected 401"; exit 1; }

          # Test 4: Auth with key (-> 200)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/ask \
            -H "Content-Type: application/json" \
            -H "X-API-Key: test-key-ci" \
            -d '{"question":"test"}')
          echo "Ask with key: HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { docker logs agent-test; exit 1; }

          echo "All tests passed!"

      - name: Cleanup
        if: always()
        run: docker rm -f agent-test 2>/dev/null || true
